<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dynamic Image Authentication</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="auth-panel" aria-labelledby="app-title">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">DIA</div>
          <div>
            <h1 id="app-title">Dynamic Image Authentication</h1>
            <p>Build a personal visual challenge, then prove it by finding your match.</p>
          </div>
        </div>

        <form id="profile-form" class="profile-form">
          <label for="color-input">
            Favorite color
            <select id="color-input" name="color" required>
              <option value="red">Red</option>
              <option value="orange">Orange</option>
              <option value="yellow">Yellow</option>
              <option value="green">Green</option>
              <option value="emerald" selected>Emerald</option>
              <option value="blue">Blue</option>
              <option value="purple">Purple</option>
              <option value="pink">Pink</option>
              <option value="teal">Teal</option>
              <option value="gold">Gold</option>
              <option value="brown">Brown</option>
              <option value="gray">Gray</option>
              <option value="black">Black</option>
            </select>
          </label>

          <label for="animal-input">
            Favorite animal
            <select id="animal-input" name="animal" required>
              <option value="cat">Cat</option>
              <option value="dog">Dog</option>
              <option value="fox" selected>Fox</option>
              <option value="lion">Lion</option>
              <option value="tiger">Tiger</option>
              <option value="bear">Bear</option>
              <option value="panda">Panda</option>
              <option value="rabbit">Rabbit</option>
              <option value="bird">Bird</option>
              <option value="frog">Frog</option>
              <option value="giraffe">Giraffe</option>
              <option value="horse">Horse</option>
              <option value="fish">Fish</option>
              <option value="turtle">Turtle</option>
              <option value="owl">Owl</option>
            </select>
          </label>

          <div class="form-actions">
            <button type="submit">Generate challenge</button>
            <button id="random-button" type="button" class="secondary-button">Random pick</button>
          </div>
        </form>

        <div class="status-strip" aria-live="polite">
          <span id="challenge-text">Enter your details to begin.</span>
          <span id="attempt-text">Attempts: 0</span>
          <span id="timer-text">Timer: --</span>
          <span id="movement-text">Movement: --</span>
        </div>
      </section>

      <section class="challenge-panel" aria-label="Image authentication challenge">
        <div class="canvas-wrap">
          <canvas id="challenge-canvas" width="980" height="640"></canvas>
          <div id="empty-state" class="empty-state">
            <strong>No challenge yet</strong>
            <span>Your generated image will appear here.</span>
          </div>
          <div id="success-overlay" class="success-overlay" aria-live="polite">
            <strong id="overlay-title">Authenticated</strong>
            <span id="overlay-detail">You found the matching image.</span>
          </div>
        </div>

        <div class="result-row">
          <div id="result-message" class="result-message">Waiting for a challenge.</div>
          <button id="reset-button" type="button" class="secondary-button">Reset</button>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
